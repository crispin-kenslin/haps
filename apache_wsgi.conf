<VirtualHost *:80>
    ServerName herbicide-model.tnau.ac.in
    ServerAdmin admin@tnau.ac.in

    # Example 1: Deployment using mod_proxy (Recommended for Waitress/Gunicorn)
    # Ensure mod_proxy and mod_proxy_http are enabled in Apache
    # ProxyPass / http://127.0.0.1:5000/
    # ProxyPassReverse / http://127.0.0.1:5000/

    # Example 2: Deployment using mod_wsgi
    # Ensure mod_wsgi is installed and enabled for your Python version
    
    # DocumentRoot /path/to/herbicide-model/web_pro
    # WSGIDaemonProcess herbapp user=www-data group=www-data threads=5 python-home=/path/to/herbicide-model/web_pro/herb-web
    # WSGIScriptAlias / /path/to/herbicide-model/web_pro/herbapp.wsgi

    # <Directory /path/to/herbicide-model/web_pro>
    #     WSGIProcessGroup herbapp
    #     WSGIApplicationGroup %{GLOBAL}
    #     Require all granted
    # </Directory>

    # Serve static files directly via Apache for better performance
    Alias /static /path/to/herbicide-model/web_pro/static
    <Directory /path/to/herbicide-model/web_pro/static>
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/herbapp_error.log
    CustomLog ${APACHE_LOG_DIR}/herbapp_access.log combined
</VirtualHost>

# Note: If using mod_wsgi, you will need a herbapp.wsgi file in your web_pro directory with the following content:
# 
# import sys
# sys.path.insert(0, '/path/to/herbicide-model/web_pro')
# from app import app as application
